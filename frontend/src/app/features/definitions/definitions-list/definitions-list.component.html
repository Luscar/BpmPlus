<div class="page">
  <h1 class="page-title">
    <mat-icon>account_tree</mat-icon>
    Définitions de processus
  </h1>

  @if (loading) {
    <div class="center"><mat-spinner /></div>
  } @else {
    <mat-card>
      <mat-card-content>
        <table mat-table [dataSource]="definitions" class="full-width">

          <ng-container matColumnDef="nom">
            <th mat-header-cell *matHeaderCellDef>Nom</th>
            <td mat-cell *matCellDef="let d">
              <strong>{{ d.nom }}</strong>
            </td>
          </ng-container>

          <ng-container matColumnDef="cle">
            <th mat-header-cell *matHeaderCellDef>Clé</th>
            <td mat-cell *matCellDef="let d">
              <code class="mono">{{ d.cle }}</code>
            </td>
          </ng-container>

          <ng-container matColumnDef="version">
            <th mat-header-cell *matHeaderCellDef>Version</th>
            <td mat-cell *matCellDef="let d">v{{ d.version }}</td>
          </ng-container>

          <ng-container matColumnDef="statut">
            <th mat-header-cell *matHeaderCellDef>Statut</th>
            <td mat-cell *matCellDef="let d">
              <app-status-badge [statut]="d.statut" />
            </td>
          </ng-container>

          <ng-container matColumnDef="noeuds">
            <th mat-header-cell *matHeaderCellDef>Nœuds</th>
            <td mat-cell *matCellDef="let d">{{ d.nombreNoeuds }}</td>
          </ng-container>

          <ng-container matColumnDef="dateCreation">
            <th mat-header-cell *matHeaderCellDef>Créée le</th>
            <td mat-cell *matCellDef="let d">{{ d.dateCreation | date:'dd/MM/yyyy HH:mm' }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let d">
              <button mat-icon-button color="primary"
                [routerLink]="['/definitions', d.cle]"
                matTooltip="Voir le diagramme">
                <mat-icon>schema</mat-icon>
              </button>
              <button mat-icon-button color="accent"
                [routerLink]="['/instances']" [queryParams]="{ cleDefinition: d.cle }"
                matTooltip="Voir les instances">
                <mat-icon>list_alt</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            class="clickable-row"
            [routerLink]="['/definitions', row.cle]"></tr>

        </table>

        @if (definitions.length === 0) {
          <div class="empty">
            <mat-icon>account_tree</mat-icon>
            <p>Aucune définition trouvée.</p>
          </div>
        }
      </mat-card-content>
    </mat-card>
  }
</div>
